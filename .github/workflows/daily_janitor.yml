name: Daily Janitor Cleanup
on:
  schedule:
    - cron: '0 0 * * *'  # Run every day at 00:00 UTC
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Janitor API
        run: |
          curl -X POST "${{ secrets.VERCEL_API_URL }}/api/cron/janitor" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail --silent --show-error
